<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MIIAM | Rider Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #fff4f4;
    color: #4d212a;
    margin: 0;
    padding: 0;
}
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
.glass-panel {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
}
.kinetic-gradient {
    background: linear-gradient(135deg, #ba001c 0%, #d00020 50%, #ff7670 100%);
}
.bipolar-split {
    display: grid;
    grid-template-columns: 1fr;
}
@media (min-width: 768px) {
    .bipolar-split {
        grid-template-columns: 1.1fr 0.9fr;
    }
}
@keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
@keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(186, 0, 28, 0.3); } 50% { box-shadow: 0 0 40px rgba(186, 0, 28, 0.5); } }
.animate-float { animation: float 4s ease-in-out infinite; }
.animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
</style>
</head>
<body class="bg-surface selection:bg-primary-fixed selection:text-on-primary-container">
<main class="min-h-screen bipolar-split overflow-hidden">
<!-- VISUAL SIDE -->
<section class="relative hidden md:flex items-center justify-center p-12 overflow-hidden bg-gradient-to-br from-primary via-[#a00018] to-[#d00020]">
<div class="absolute inset-0 z-0 opacity-30">
<img class="w-full h-full object-cover" data-alt="dynamic long exposure of city lights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBNONWs9fsq_GTLapmZoujNPMktrmwOglPm1YkUKsMx-4MkoyKpcNyZoA4fOfAcQA5Vfnc47y1SEOtBW8IFkGffexC32VFV3gGpq3pklMiekqGRrQd2GSpQrE-xE_h2INP8-zlVAsiYFdT6uaEQYDZse-X9yT__iJvcEV0ZnwYfSu7qdTr51dGefH2hPwTpzMqtQijpyxkTNWuFuKLXLv21ZQiiNaFGyBPn-Wj2nJoTr-DbJMV415yK0jOtsmX4xVbrPmSJPGPpoQ"/>
</div>
<!-- Floating Elements -->
<div class="absolute top-[15%] left-[10%] glass-panel rounded-2xl p-5 shadow-2xl rotate-[-12deg] z-10 border border-white/20 animate-float">
<span class="text-5xl">🚀</span>
</div>
<div class="absolute bottom-[25%] right-[15%] glass-panel rounded-2xl p-5 shadow-2xl rotate-[15deg] z-10 border border-white/20 animate-float" style="animation-delay: 1s;">
<span class="text-5xl">🍕</span>
</div>
<div class="absolute top-1/2 right-[5%] glass-panel rounded-2xl p-5 shadow-2xl rotate-[5deg] z-10 border border-white/20 animate-float" style="animation-delay: 2s;">
<span class="text-5xl">⚡</span>
</div>
<div class="absolute top-[70%] left-[20%] glass-panel rounded-2xl p-5 shadow-2xl -rotate-[8deg] z-10 border border-white/20 animate-float" style="animation-delay: 0.5s;">
<span class="text-4xl">🛵</span>
</div>
<!-- Brand Message -->
<div class="relative z-20 text-on-primary max-w-lg">
<h1 class="text-[5.5rem] font-extrabold leading-[0.9] tracking-tighter mb-6">
MIIAM<br/><span class="text-white/80">RIDER</span>
</h1>
<p class="text-xl font-medium opacity-90 max-w-sm leading-relaxed">
The fastest fleet on the planet. Drive your way and earn on every mile.
</p>
<div class="mt-12 flex gap-4">
<div class="h-1 w-20 rounded-full bg-on-primary"></div>
<div class="h-1 w-4 rounded-full bg-on-primary/30"></div>
<div class="h-1 w-4 rounded-full bg-on-primary/30"></div>
</div>
</div>
<!-- Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>
</section>
<!-- FORM SIDE -->
<section class="flex flex-col justify-between p-8 md:p-12 lg:p-16 bg-surface relative overflow-hidden">
<!-- Background Pattern -->
<div class="absolute top-0 right-0 w-96 h-96 bg-primary/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 bg-secondary/5 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"></div>
<!-- Mobile Header -->
<div class="md:hidden flex justify-center mb-10">
<span class="text-4xl font-black tracking-tighter text-primary">MIIAM</span>
</div>
<div class="max-w-md mx-auto w-full relative z-10">
<header class="mb-10">
<h2 class="text-4xl md:text-5xl font-bold tracking-tight text-on-surface mb-3">Welcome back</h2>
<p class="text-on-surface-variant text-lg font-medium">Ready to hit the road?</p>
</header>
<!-- Phone Input -->
<div class="space-y-6">
<div class="relative">
<label class="block text-sm font-bold text-on-surface mb-3 uppercase tracking-widest px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">phone</span>Phone Number</label>
<div class="flex gap-3">
<div class="w-24 bg-surface-container-lowest rounded-xl px-4 py-4 flex items-center justify-center font-bold text-on-surface shadow-sm border border-pink-100">
+44
</div>
<input class="flex-1 bg-surface-container-lowest border-none rounded-xl px-6 py-4 text-lg font-semibold focus:ring-2 focus:ring-primary/40 focus:bg-white transition-all placeholder:text-on-surface-variant/40 shadow-sm" placeholder="000 000 0000" type="tel"/>
</div>
</div>
<button class="w-full kinetic-gradient text-white rounded-xl py-5 text-lg font-bold shadow-[0px_20px_40px_rgba(186,0,28,0.25)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group animate-pulse-glow">
<span>Get OTP</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="px-4 text-sm font-bold text-on-surface-variant/60 uppercase tracking-wider">Quick Access</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-white py-4 rounded-xl shadow-md border border-pink-100 hover:bg-surface-container-low transition-all font-semibold hover:shadow-lg">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAArRXK5c39tUA62zeKv--O2eJk6sJxDgKHHkIvfysOE65_BY0EBcci3HBxowTSPEc85Ynr8TpugiNn6rCBXCylrWwZ_vVnRqmWaLDT7q3L0OIKUBGllgrucobsHY8AxeNDHp-NkSFrnFhzuwHRMpkapEO_Ehc_gvjYUoW0dJW6tg1-Yt2XIbyr1jwEyMkygr-2Sb-gUsMbfriwGd04nV_z9AGw49aEchw-0ayCQ8Tum4rx6X__NJAmAUAuZ6VzaQqp5FucxdEfNtY"/>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-[#1877F2] text-white py-4 rounded-xl shadow-md hover:shadow-lg hover:opacity-90 transition-all font-semibold">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
<span>Facebook</span>
</button>
</div>
</div>
<!-- Footer -->
<footer class="mt-12 text-center relative z-10">
<div class="bg-gradient-to-r from-secondary-container to-blue-50 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-between gap-4 shadow-lg">
<div class="text-left">
<p class="font-bold text-on-secondary-container text-lg">New to the fleet?</p>
<p class="text-sm text-on-secondary-container/80">Start earning today with flexible hours.</p>
</div>
<a class="bg-secondary text-white px-6 py-3 rounded-full font-bold text-sm hover:bg-secondary-dim transition-all flex items-center gap-2 shadow-lg hover:shadow-xl" href="#">
<span>Become a Partner</span>
<span class="material-symbols-outlined text-sm">open_in_new</span>
</a>
</div>
</footer>
</section>
</main>
<!-- Background texture -->
<div class="fixed inset-0 pointer-events-none z-[100] opacity-[0.02] mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
</body></html>
