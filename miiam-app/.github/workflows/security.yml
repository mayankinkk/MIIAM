name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miiam-app/package-lock.json
      - name: Install dependencies
        run: cd miiam-app && npm ci
      - name: Run security audit
        run: cd miiam-app && npm audit --audit-level=high
        continue-on-error: true

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miiam-app/package-lock.json
      - name: Install dependencies
        run: cd miiam-app && npm ci
      - name: Check for outdated packages
        run: cd miiam-app && npm outdated || true