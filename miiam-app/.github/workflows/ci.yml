name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miiam-app/package-lock.json
      - name: Install dependencies
        run: cd miiam-app && npm ci
      - name: Run lint
        run: cd miiam-app && npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miiam-app/package-lock.json
      - name: Install dependencies
        run: cd miiam-app && npm ci
      - name: Run tests
        run: cd miiam-app && npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miiam-app/package-lock.json
      - name: Install dependencies
        run: cd miiam-app && npm ci
      - name: Build
        run: cd miiam-app && npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miiam-app/package-lock.json
      - name: Install dependencies
        run: cd miiam-app && npm ci
      - name: Install Playwright
        run: cd miiam-app && npx playwright install --with-deps
      - name: Run E2E tests
        run: cd miiam-app && npm run e2e